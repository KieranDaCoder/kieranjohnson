<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="End Gambling Ads — Alliance for Gambling Reform">
  <defs>
    <radialGradient id="glow" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#1d2228" />
      <stop offset="45%" stop-color="#121417" />
      <stop offset="100%" stop-color="#080809" />
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26303a" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#0c1015" stop-opacity="0.2" />
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6" /></filter>
  </defs>

  <!-- Dark room -->
  <rect width="1200" height="1200" fill="url(#glow)" />

  <!-- Blurred broadcast glow (the TV) -->
  <g filter="url(#soft)" opacity="0.9">
    <rect x="120" y="150" width="760" height="470" rx="14" fill="url(#screen)" />
    <rect x="150" y="200" width="520" height="360" rx="8" fill="#1c3a24" opacity="0.45" />
    <ellipse cx="410" cy="380" rx="180" ry="90" fill="#2c4a30" opacity="0.4" />
  </g>

  <!-- Faint betting odds column, right side -->
  <g font-family="Menlo, Consolas, monospace" font-size="40" opacity="0.5">
    <g fill="#7d96b3">
      <text x="940" y="210">1.85</text>
      <text x="940" y="300">3.50</text>
      <text x="940" y="390">2.20</text>
      <text x="940" y="480">1.62</text>
      <text x="940" y="570">2.75</text>
      <text x="940" y="660">1.70</text>
    </g>
    <g fill="#4caf68" text-anchor="end">
      <text x="1140" y="210">+105</text>
      <text x="1140" y="300">+170</text>
      <text x="1140" y="390">+150</text>
      <text x="1140" y="480">+175</text>
      <text x="1140" y="570">+205</text>
      <text x="1140" y="660">+115</text>
    </g>
  </g>

  <!-- AGR-style aperture mark: three pinwheel blades, one yellow -->
  <g transform="translate(600,470) scale(1.9)">
    <!-- grey blades -->
    <path transform="rotate(120)" d="M0,0 C0,-20 12,-45 38,-52 C46,-34 44,-10 24,8 C16,8 6,6 0,0 Z" fill="#6f6f6f" stroke-linejoin="round" />
    <path transform="rotate(240)" d="M0,0 C0,-20 12,-45 38,-52 C46,-34 44,-10 24,8 C16,8 6,6 0,0 Z" fill="#7a7a7a" stroke-linejoin="round" />
    <!-- yellow blade -->
    <path d="M0,0 C0,-20 12,-45 38,-52 C46,-34 44,-10 24,8 C16,8 6,6 0,0 Z" fill="#f4cf17" stroke-linejoin="round" />
  </g>

  <!-- Charity name, faint -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#5a5a5a" text-anchor="middle" font-weight="700" letter-spacing="4">
    <text x="600" y="690" font-size="58">ALLIANCE FOR</text>
    <text x="600" y="758" font-size="58">GAMBLING REFORM</text>
  </g>

  <!-- subtle vignette bottom for card title legibility -->
  <rect x="0" y="820" width="1200" height="380" fill="#000000" opacity="0.35" />
</svg>
